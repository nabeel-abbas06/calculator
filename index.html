<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" 
  crossorigin="anonymous"></script>
  <title>Calculator</title>
  <style>
    body {
      background-color: burlywood;
    }

    .center {
      width: 200px;
      margin: 150px auto;
      padding: 10px;
      border: 2px solid #333;
      background-color: #fff3e0;
      border-radius: 10px;
    }

    #display {
      width: 180px;
      height: 30px;
      font-size: 18px;
      margin-bottom: 10px;
      text-align: right;
    }

    .buttons input {
      width: 40px;
      height: 40px;
      margin: 3px;
      font-size: 18px;
    }

    input[type=button] {
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="center">
  <form name="forms">
    <input type="text" id="display" name="display">

  <div class="buttons">
    <input type="button" id="seven" value="7">
    <input type="button" id="eight" value="8">
    <input type="button" id="nine" value="9">
    <input type="button" id="divide" value="/"><br>
    <input type="button" id="four" value="4">
    <input type="button" id="five" value="5">
    <input type="button" id="six" value="6">
    <input type="button" id="multi" value="*"><br>
    <input type="button" id="one" value="1">
    <input type="button" id="two" value="2">
    <input type="button" id="three" value="3">
    <input type="button" id="subs" value="-"><br>
    <input type="button" id="dot" value=".">
    <input type="button" id="zero" value="0">
    <input type="button" id="clear" value="C">
    <input type="button" id="add" value="+"><br>
    <input type="button" id="backspace" value="←">
    <input type="button" id="equal" value="=">
  </div>
  </form>
  </div> 

<script>
  $(document).ready(function () {
    $("#one").click(function () {
    document.forms.display.value += 1;
      });

    $("#two").click(function () {
    document.forms.display.value += 2;
      });

    $("#three").click(function () {
    document.forms.display.value += 3;
      });

    $("#four").click(function () {
    document.forms.display.value += 4;
      });

    $("#five").click(function () {
    document.forms.display.value += 5;
      });

    $("#six").click(function () {
    document.forms.display.value += 6;
      });

    $("#seven").click(function () {
    document.forms.display.value += 7;
      });

    $("#eight").click(function () {
    document.forms.display.value += 8;
      });

    $("#nine").click(function () {
    document.forms.display.value += 9;
      });

    $("#zero").click(function () {
    document.forms.display.value += 0;
      });

    $("#add").click(function () {
    document.forms.display.value += '+';
      });

    $("#subs").click(function () {
    document.forms.display.value += '-';
      });

    $("#multi").click(function () {
    document.forms.display.value += '*';
      });

    $("#divide").click(function () {
    document.forms.display.value += '/';
      });

    $("#dot").click(function () {
    document.forms.display.value += '.';
      });

    $("#backspace").click(function () {
    let currentValue = document.forms.display.value;
    document.forms.display.value = currentValue.slice(0, -1);
      });


    $("#equal").click(function () {
      if (document.forms.display.value === "") {
      alert("Please Enter Any Numbers To Calculate.");
        }

      else {
        document.forms.display.value = eval(document.forms.display.value);
        }
      }
    );

    $("#clear").click(function () {
    document.forms.display.value = "";
      });
    });
</script>
</body>
</html>
